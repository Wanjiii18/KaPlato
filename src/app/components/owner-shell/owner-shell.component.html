<div class="owner-layout">
  <div class="mobile-top-bar">
    <div class="mobile-brand" routerLink="/karenderia-dashboard">
      <div class="brand-icon">{{ getKarenderiaBrandInitials() }}</div>
      <div class="brand-info">
        <h3>{{ getKarenderiaDisplayName() }}</h3>
        <span>{{ sectionLabel }}</span>
      </div>
    </div>
    <div class="mobile-actions">
      <ion-button fill="clear" size="small" routerLink="/karenderia-settings">
        <ion-icon name="person-circle-outline" slot="icon-only"></ion-icon>
      </ion-button>
      <ion-button fill="clear" size="small" (click)="logout()">
        <ion-icon name="log-out-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </div>
  </div>

  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="brand" routerLink="/karenderia-dashboard">
        <div class="brand-icon">{{ getKarenderiaBrandInitials() }}</div>
        <div class="brand-info">
          <h3>{{ getKarenderiaDisplayName() }}</h3>
          <span>Owner Dashboard</span>
        </div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <a class="nav-item" [class.active]="isActive('dashboard')" routerLink="/karenderia-dashboard">
        <ion-icon name="grid-outline"></ion-icon>
        <span>Dashboard</span>
      </a>
      <a class="nav-item" [class.active]="isActive('menu')" routerLink="/karenderia-menu">
        <ion-icon name="restaurant-outline"></ion-icon>
        <span>Menu Management</span>
      </a>
      <a class="nav-item" [class.active]="isActive('daily-menu')" routerLink="/daily-menu-management">
        <ion-icon name="calendar-outline"></ion-icon>
        <span>Menu of the Day</span>
      </a>
      <a class="nav-item" [class.active]="isActive('pos')" routerLink="/karenderia-orders-pos">
        <ion-icon name="calculator-outline"></ion-icon>
        <span>POS</span>
      </a>
      <a class="nav-item" [class.active]="isActive('inventory')" routerLink="/inventory-management">
        <ion-icon name="cube-outline"></ion-icon>
        <span>Kitchen Stock</span>
      </a>
      <a class="nav-item" [class.active]="isActive('analytics')" routerLink="/karenderia-analytics">
        <ion-icon name="analytics-outline"></ion-icon>
        <span>Analytics</span>
      </a>
      <a class="nav-item" [class.active]="isActive('profile')" routerLink="/karenderia-settings">
        <ion-icon name="person-outline"></ion-icon>
        <span>Profile</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <button type="button" class="nav-item logout-btn" (click)="logout()">
        <ion-icon name="log-out-outline"></ion-icon>
        <span>Sign Out</span>
      </button>
    </div>
  </aside>

  <main class="main-panel">
    <ng-content></ng-content>
  </main>
</div>
